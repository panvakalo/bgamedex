<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bgamedex — Your board game collection, organized</title>
    <meta name="description" content="Track your board game collection, log plays, manage wishlists, and get AI-powered rules help. Powered by BoardGameGeek." />
    <link rel="icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bgamedex" />
    <meta property="og:description" content="Track your board game collection, log plays, manage wishlists, and get AI-powered rules help." />
    <meta property="og:image" content="https://bgamedex.com/og-image.png" />
    <meta property="og:url" content="https://bgamedex.com" />
    <meta property="og:site_name" content="Bgamedex" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bgamedex" />
    <meta name="twitter:description" content="Track your board game collection, log plays, manage wishlists, and get AI-powered rules help." />
    <meta name="twitter:image" content="https://bgamedex.com/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bgamedex" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Apply theme before render to prevent flash
      (function() {
        var t = localStorage.getItem('bgamedex-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
